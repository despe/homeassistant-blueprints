blueprint:
  name: ZHA Schneider Cover Buttons
  description: >
    Control a cover using the physical buttons of a Schneider module via ZHA.

    - short press up → fully open
    - short press down → fully close
    - press during movement → stop
    - long press up → configurable position
    - long press down → configurable position

  domain: automation

  input:

    device:
      name: Zigbee Module
      description: Schneider module used
      selector:
        device:
          integration: zha

    cover_entity:
      name: Cover
      selector:
        entity:
          domain: cover

    long_up_position:
      name: Long press up position
      default: 80
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

    long_down_position:
      name: Long press down position
      default: 35
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

mode: restart

trigger:
  - platform: event
    event_type: zha_event

condition:
  - condition: template
    value_template: >
      {{ trigger.event.data.device_id == device_id }}

variables:
  cover: !input cover_entity

action:

  - choose:

      # LONG PRESS DOWN
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.command == 'down_close' }}
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input long_down_position

      # LONG PRESS UP
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.command == 'up_open' }}
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: !input cover_entity
            data:
              position: !input long_up_position

      # SHORT PRESS
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.command == 'se_stop_or_step_lift_percentage' }}
        sequence:

          - choose:

              # STOP during opening
              - conditions:
                  - condition: template
                    value_template: >
                      {{ trigger.event.data.params.direction == 0 }}
                  - condition: state
                    entity_id: !input cover_entity
                    state: opening
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input cover_entity

              # STOP during closing
              - conditions:
                  - condition: template
                    value_template: >
                      {{ trigger.event.data.params.direction == 1 }}
                  - condition: state
                    entity_id: !input cover_entity
                    state: closing
                sequence:
                  - service: cover.stop_cover
                    target:
                      entity_id: !input cover_entity

            default:

              - choose:

                  # short press up → open
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ trigger.event.data.params.direction == 0 }}
                    sequence:
                      - service: cover.open_cover
                        target:
                          entity_id: !input cover_entity

                  # short press down → close
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ trigger.event.data.params.direction == 1 }}
                    sequence:
                      - service: cover.close_cover
                        target:
                          entity_id: !input cover_entity
